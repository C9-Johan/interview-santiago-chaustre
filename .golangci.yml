version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - cyclop
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gosec
    - govet
    - maintidx
    - nestif
    - prealloc
    - revive
    - staticcheck
  settings:
    cyclop:
      max-complexity: 30
      package-average: 10
    dupl:
      threshold: 150
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-checks:
        - hugeParam
        - rangeValCopy
      settings:
        # domain.Escalation is ~384B and flows by value through the exported
        # repository.EscalationStore contract (Record / List). Rather than
        # splitting the domain contract or adding //nolint at every implementer,
        # we raise the hugeParam threshold above the size of the largest domain
        # value type that deliberately crosses interface boundaries by value.
        hugeParam:
          sizeThreshold: 512
        rangeValCopy:
          sizeThreshold: 512
    maintidx:
      under: 20
    nestif:
      min-complexity: 5
    revive:
      rules:
        - name: unused-parameter
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - dupl
          - funlen
          - gocognit
          - maintidx
        path: _test\.go
      - linters:
          - errcheck
          - revive
          - staticcheck
        path: mocks/
      # Integration tests spawn Mockoon as a subprocess and tail its log file.
      # G204 (subprocess) and G304 (file inclusion) fire on the required
      # exec.Command + os.Open; the paths come from t.TempDir and repoPath
      # and the binary name is a compile-time literal.
      - linters:
          - gosec
        path: tests/integration/
    paths:
      - third_party$
      - builtin$
      - examples$
      - mocks
formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - mocks
  settings:
    goimports:
      local-prefixes:
        - github.com/chaustre/inquiryiq
