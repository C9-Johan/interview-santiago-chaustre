# Local observability stack for InquiryIQ. podman-compose compatible.
#
# Bring it up:   make obs-up    (or: podman compose -f compose/observability.yml up -d)
# Shut it down:  make obs-down
#
# The app sends traces to Alloy (OTLP 4318). Alloy forwards them to Tempo.
# Grafana at http://localhost:3000 (anonymous, Admin role) has Tempo and
# Prometheus pre-provisioned as datasources.

services:
  alloy:
    image: docker.io/grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro,Z
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Alloy UI
    depends_on:
      - tempo
    restart: unless-stopped

  tempo:
    image: docker.io/grafana/tempo:2.8.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro,Z
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (query)
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:11.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped

volumes:
  tempo-data: {}
  prometheus-data: {}
  grafana-data: {}
