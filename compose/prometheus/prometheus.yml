global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
  # Scrape the host-run InquiryIQ service when it exposes /metrics in v2.
  # Uncomment and adjust host/port when metrics land.
  # - job_name: inquiryiq
  #   static_configs:
  #     - targets: ["host.docker.internal:8080"]
